name: Dispatch E2E evaluation

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "data/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rustgpt-e2e-dispatch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dispatch:
    name: Request black-box evaluation
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Require evaluator dispatch token
        env:
          DISPATCH_TOKEN: ${{ secrets.RUSTGPT_EVALS_DISPATCH_TOKEN }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "RUSTGPT_EVALS_DISPATCH_TOKEN is not configured" >&2
            exit 1
          fi

      - name: Dispatch exact source revision
        uses: actions/github-script@v9
        env:
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
          SOURCE_REF: ${{ github.ref_name }}
          SOURCE_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          github-token: ${{ secrets.RUSTGPT_EVALS_DISPATCH_TOKEN }}
          script: |
            const sourceCommit = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: process.env.SOURCE_SHA,
            });
            const firstLine = sourceCommit.data.commit.message.split(/\r?\n/, 1)[0].trim();
            const subjectCharacters = Array.from(firstLine);
            const commitSubject = subjectCharacters.length > 100
              ? `${subjectCharacters.slice(0, 99).join("")}…`
              : firstLine;
            await github.rest.repos.createDispatchEvent({
              owner: "BA-CalderonMorales",
              repo: "rustgpt-evals",
              event_type: "rustgpt-main-updated",
              client_payload: {
                repository: process.env.SOURCE_REPOSITORY,
                sha: process.env.SOURCE_SHA,
                short_sha: process.env.SOURCE_SHA.slice(0, 7),
                commit_subject: commitSubject,
                commit_url: sourceCommit.data.html_url,
                ref: process.env.SOURCE_REF,
                source_run_url: process.env.SOURCE_RUN_URL,
              },
            });
